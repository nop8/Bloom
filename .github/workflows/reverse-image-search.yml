name: Temporary reverse image search

on:
  push:
    branches:
      - temp-reverse-image-search
    paths:
      - .github/workflows/reverse-image-search.yml

permissions:
  contents: write

jobs:
  reverse-search:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp-reverse-image-search

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Search SauceNAO, IQDB and ascii2d
        continue-on-error: true
        run: |
          python -m pip install --quiet requests beautifulsoup4 lxml
          python <<'PY'
          import json
          import traceback
          from pathlib import Path
          from urllib.parse import urljoin

          import requests
          from bs4 import BeautifulSoup

          image_path = Path('reverse-image-temp/source.png')
          out = Path('reverse-image-temp/results-engines')
          out.mkdir(parents=True, exist_ok=True)
          report = {}
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/150.0.0.0 Safari/537.36',
              'Accept-Language': 'en-US,en;q=0.9',
          }

          # SauceNAO JSON API (anonymous access)
          try:
              with image_path.open('rb') as f:
                  r = requests.post(
                      'https://saucenao.com/search.php',
                      headers=headers,
                      data={'output_type': '2', 'numres': '50', 'db': '999'},
                      files={'file': ('source.png', f, 'image/png')},
                      timeout=120,
                  )
              report['saucenao_status'] = r.status_code
              report['saucenao_content_type'] = r.headers.get('content-type')
              (out / 'saucenao_raw.txt').write_text(r.text, encoding='utf-8')
              try:
                  (out / 'saucenao.json').write_text(
                      json.dumps(r.json(), indent=2, ensure_ascii=False), encoding='utf-8'
                  )
              except Exception:
                  pass
          except Exception as exc:
              report['saucenao_error'] = repr(exc)
              report['saucenao_traceback'] = traceback.format_exc()

          # IQDB HTML search
          try:
              with image_path.open('rb') as f:
                  r = requests.post(
                      'https://iqdb.org/',
                      headers=headers,
                      files={'file': ('source.png', f, 'image/png')},
                      timeout=120,
                  )
              report['iqdb_status'] = r.status_code
              report['iqdb_url'] = r.url
              (out / 'iqdb.html').write_text(r.text, encoding='utf-8')
              soup = BeautifulSoup(r.text, 'lxml')
              iqdb_links = []
              for a in soup.find_all('a', href=True):
                  iqdb_links.append({
                      'text': a.get_text(' ', strip=True),
                      'url': urljoin(r.url, a['href']),
                  })
              (out / 'iqdb_links.json').write_text(
                  json.dumps(iqdb_links, indent=2, ensure_ascii=False), encoding='utf-8'
              )
          except Exception as exc:
              report['iqdb_error'] = repr(exc)
              report['iqdb_traceback'] = traceback.format_exc()

          # ascii2d HTML search
          try:
              session = requests.Session()
              session.headers.update(headers)
              landing = session.get('https://ascii2d.net/', timeout=60)
              token = None
              soup = BeautifulSoup(landing.text, 'lxml')
              token_input = soup.find('input', {'name': 'authenticity_token'})
              if token_input:
                  token = token_input.get('value')
              data = {'authenticity_token': token} if token else {}
              with image_path.open('rb') as f:
                  r = session.post(
                      'https://ascii2d.net/search/file',
                      data=data,
                      files={'file': ('source.png', f, 'image/png')},
                      timeout=120,
                      allow_redirects=True,
                  )
              report['ascii2d_status'] = r.status_code
              report['ascii2d_url'] = r.url
              (out / 'ascii2d.html').write_text(r.text, encoding='utf-8')
              soup = BeautifulSoup(r.text, 'lxml')
              ascii_links = []
              for a in soup.find_all('a', href=True):
                  ascii_links.append({
                      'text': a.get_text(' ', strip=True),
                      'url': urljoin(r.url, a['href']),
                  })
              (out / 'ascii2d_links.json').write_text(
                  json.dumps(ascii_links, indent=2, ensure_ascii=False), encoding='utf-8'
              )
          except Exception as exc:
              report['ascii2d_error'] = repr(exc)
              report['ascii2d_traceback'] = traceback.format_exc()

          (out / 'report.json').write_text(json.dumps(report, indent=2, ensure_ascii=False), encoding='utf-8')
          print(json.dumps(report, indent=2, ensure_ascii=False))
          PY

      - name: Commit reverse-search results
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add reverse-image-temp/results-engines || true
          git commit -m "Store reverse image engine results" || exit 0
          git push origin HEAD:temp-reverse-image-search
