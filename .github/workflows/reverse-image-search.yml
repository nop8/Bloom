name: Temporary reverse image search

on:
  push:
    branches:
      - temp-reverse-image-search
    paths:
      - .github/workflows/reverse-image-search.yml

permissions:
  contents: write

jobs:
  lens-search:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp-reverse-image-search

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Submit image to Google Lens
        continue-on-error: true
        run: |
          python -m pip install --quiet requests beautifulsoup4 lxml
          python <<'PY'
          import html
          import json
          import re
          import traceback
          from pathlib import Path
          from urllib.parse import unquote

          import requests
          from bs4 import BeautifulSoup

          out = Path('reverse-image-temp/results')
          out.mkdir(parents=True, exist_ok=True)
          report = {}

          try:
              session = requests.Session()
              session.headers.update({
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/150.0.0.0 Safari/537.36',
                  'Accept-Language': 'en-US,en;q=0.9',
              })

              image_path = Path('reverse-image-temp/source.png')
              with image_path.open('rb') as f:
                  response = session.post(
                      'https://lens.google.com/upload',
                      params={'hl': 'en', 'gl': 'us'},
                      files={
                          'encoded_image': ('source.png', f, 'image/png'),
                          'image_content': (None, ''),
                      },
                      allow_redirects=False,
                      timeout=60,
                  )

              report['upload_status'] = response.status_code
              report['upload_headers'] = dict(response.headers)
              report['upload_body_prefix'] = response.text[:2000]
              location = response.headers.get('Location')
              report['location'] = location

              if location:
                  result = session.get(location, allow_redirects=True, timeout=60)
                  report['result_status'] = result.status_code
                  report['result_url'] = result.url
                  report['result_headers'] = dict(result.headers)
                  (out / 'lens.html').write_text(result.text, encoding='utf-8')

                  soup = BeautifulSoup(result.text, 'lxml')
                  links = []
                  for tag in soup.find_all(href=True):
                      links.append({'text': tag.get_text(' ', strip=True), 'url': tag.get('href')})

                  raw_urls = re.findall(r'https?://[^\s"\'<>\\]+', result.text)
                  decoded_urls = []
                  for value in raw_urls:
                      value = html.unescape(value).replace('\\u003d', '=').replace('\\u0026', '&').replace('\\/', '/')
                      try:
                          value = unquote(value)
                      except Exception:
                          pass
                      decoded_urls.append(value)

                  (out / 'links.json').write_text(
                      json.dumps({'html_links': links, 'raw_urls': decoded_urls}, indent=2, ensure_ascii=False),
                      encoding='utf-8',
                  )
          except Exception as exc:
              report['error'] = repr(exc)
              report['traceback'] = traceback.format_exc()

          (out / 'report.json').write_text(json.dumps(report, indent=2, ensure_ascii=False), encoding='utf-8')
          print(json.dumps(report, indent=2, ensure_ascii=False))
          PY

      - name: Commit Lens results
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add reverse-image-temp/results || true
          git commit -m "Store temporary Lens results" || exit 0
          git push origin HEAD:temp-reverse-image-search
