name: Temporary reverse image search

on:
  push:
    branches:
      - temp-reverse-image-search
    paths:
      - .github/workflows/reverse-image-search.yml

permissions:
  contents: write

jobs:
  lens-search:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp-reverse-image-search

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Render Google Lens results in Chromium
        continue-on-error: true
        run: |
          python -m pip install --quiet requests playwright
          python -m playwright install --with-deps chromium
          python <<'PY'
          import json
          import traceback
          from pathlib import Path

          import requests
          from playwright.sync_api import sync_playwright

          out = Path('reverse-image-temp/results-browser')
          out.mkdir(parents=True, exist_ok=True)
          report = {}

          try:
              ua = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/150.0.0.0 Safari/537.36'
              session = requests.Session()
              session.headers.update({'User-Agent': ua, 'Accept-Language': 'en-US,en;q=0.9'})

              with open('reverse-image-temp/source.png', 'rb') as image:
                  upload = session.post(
                      'https://lens.google.com/upload',
                      params={'hl': 'en', 'gl': 'us'},
                      files={
                          'encoded_image': ('source.png', image, 'image/png'),
                          'image_content': (None, ''),
                      },
                      allow_redirects=False,
                      timeout=60,
                  )

              report['upload_status'] = upload.status_code
              report['location'] = upload.headers.get('Location')
              report['request_cookies'] = [
                  {'name': c.name, 'value': c.value, 'domain': c.domain, 'path': c.path}
                  for c in session.cookies
              ]

              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True, args=['--no-sandbox', '--disable-blink-features=AutomationControlled'])
                  context = browser.new_context(
                      user_agent=ua,
                      locale='en-US',
                      viewport={'width': 1440, 'height': 1200},
                  )

                  cookies = []
                  for cookie in session.cookies:
                      cookies.append({
                          'name': cookie.name,
                          'value': cookie.value,
                          'domain': cookie.domain or '.google.com',
                          'path': cookie.path or '/',
                          'secure': True,
                      })
                  if cookies:
                      context.add_cookies(cookies)

                  page = context.new_page()
                  page.goto(report['location'], wait_until='domcontentloaded', timeout=120000)
                  page.wait_for_timeout(15000)

                  report['final_url'] = page.url
                  report['title'] = page.title()
                  body_text = page.locator('body').inner_text(timeout=30000)
                  links = page.locator('a').evaluate_all(
                      "els => els.map(a => ({text: (a.innerText || a.getAttribute('aria-label') || '').trim(), url: a.href, aria: a.getAttribute('aria-label')}))"
                  )
                  images = page.locator('img').evaluate_all(
                      "els => els.map(i => ({alt: i.alt, src: i.src, width: i.naturalWidth, height: i.naturalHeight}))"
                  )

                  (out / 'body.txt').write_text(body_text, encoding='utf-8')
                  (out / 'page.html').write_text(page.content(), encoding='utf-8')
                  (out / 'links.json').write_text(json.dumps(links, indent=2, ensure_ascii=False), encoding='utf-8')
                  (out / 'images.json').write_text(json.dumps(images, indent=2, ensure_ascii=False), encoding='utf-8')
                  page.screenshot(path=str(out / 'page.png'), full_page=True)
                  browser.close()
          except Exception as exc:
              report['error'] = repr(exc)
              report['traceback'] = traceback.format_exc()

          (out / 'report.json').write_text(json.dumps(report, indent=2, ensure_ascii=False), encoding='utf-8')
          print(json.dumps(report, indent=2, ensure_ascii=False))
          PY

      - name: Commit rendered Lens results
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add reverse-image-temp/results-browser || true
          git commit -m "Store rendered Lens results" || exit 0
          git push origin HEAD:temp-reverse-image-search
