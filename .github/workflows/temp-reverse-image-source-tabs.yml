name: Temporary Google Lens parser

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temp-reverse-image-source-tabs.yml

permissions:
  contents: write

jobs:
  lens-parser:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp-reverse-image-search

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Parse Google Lens result data
        continue-on-error: true
        run: |
          python -m pip install --quiet requests beautifulsoup4 lxml pillow
          python <<'PY'
          import ast
          import base64
          import html
          import json
          import re
          import traceback
          from pathlib import Path
          from urllib.parse import unquote

          import requests
          from bs4 import BeautifulSoup
          from PIL import Image

          out = Path('reverse-image-temp/results-google-lens-parser')
          out.mkdir(parents=True, exist_ok=True)
          report = {'attempts': []}

          # Decode the full-resolution JPEG assembled earlier. Fall back to the smaller PNG.
          candidates = []
          try:
              encoded_path = Path('reverse-image-temp/source-original.jpg.b64')
              decoded_path = out / 'source-original-decoded.jpg'
              decoded_path.write_bytes(base64.b64decode(encoded_path.read_text(encoding='utf-8').strip(), validate=False))
              with Image.open(decoded_path) as im:
                  report['decoded_size'] = list(im.size)
                  report['decoded_format'] = im.format
                  im.verify()
              candidates.append(decoded_path)
          except Exception as exc:
              report['decode_error'] = repr(exc)
              report['decode_traceback'] = traceback.format_exc()

          fallback = Path('reverse-image-temp/source.png')
          if fallback.exists():
              try:
                  with Image.open(fallback) as im:
                      report['fallback_size'] = list(im.size)
                      report['fallback_format'] = im.format
              except Exception as exc:
                  report['fallback_image_error'] = repr(exc)
              candidates.append(fallback)

          def decode_js_string(value):
              return html.unescape(value.replace('\\u003d', '=').replace('\\u0026', '&').replace('\\/', '/'))

          def generic_extract(page_text):
              urls = []
              patterns = [
                  r'https?://[^\s"\'<>\\]+',
                  r'"(https?:\\/\\/[^"\\]+)"',
              ]
              for pattern in patterns:
                  for match in re.findall(pattern, page_text):
                      value = decode_js_string(match)
                      try:
                          value = unquote(value)
                      except Exception:
                          pass
                      if value.startswith('http'):
                          urls.append(value)
              # Stable de-duplication.
              seen = set()
              unique = []
              for url in urls:
                  if url not in seen:
                      seen.add(url)
                      unique.append(url)
              return unique

          def old_parser(page_text):
              soup = BeautifulSoup(page_text, 'html.parser')
              scripts = [s.get_text() for s in soup.find_all('script') if 'AF_initDataCallback(' in s.get_text()]
              parsed = {'script_count': len(scripts), 'scripts': []}
              for idx, script in enumerate(scripts):
                  item = {'index': idx, 'prefix': script[:500]}
                  try:
                      key_match = re.search(r"key:\s*'ds:(\d+)'", script)
                      hash_match = re.search(r"hash:\s*'(\d+)'", script)
                      item['key'] = key_match.group(1) if key_match else None
                      item['hash'] = hash_match.group(1) if hash_match else None
                      cleaned = script.replace('AF_initDataCallback(', '', 1)
                      if cleaned.rstrip().endswith(');'):
                          cleaned = cleaned.rstrip()[:-2]
                      if key_match and hash_match:
                          cleaned = cleaned.replace(
                              f"key: 'ds:{key_match.group(1)}', hash: '{hash_match.group(1)}', data:",
                              f'"key": "ds:{key_match.group(1)}", "hash": "{hash_match.group(1)}", "data":',
                              1,
                          ).replace('sideChannel:', '"sideChannel":')
                      try:
                          obj = json.loads(cleaned)
                          item['json_parsed'] = True
                          item['data'] = obj
                      except Exception as exc:
                          item['json_error'] = repr(exc)
                          # Save the full script separately for later inspection.
                          (out / f'af-script-{idx}.js').write_text(script, encoding='utf-8')
                  except Exception as exc:
                      item['error'] = repr(exc)
                  parsed['scripts'].append(item)
              return parsed

          uas = [
              'Mozilla/5.0 (X11; Linux x86_64; rv:103.0) Gecko/20100101 Firefox/103.0',
              'Mozilla/5.0 (Linux; Android 13; Pixel 7) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36',
              'Googlebot-Image/1.0',
          ]

          for image_path in candidates:
              for ua_index, ua in enumerate(uas):
                  attempt = {'image': str(image_path), 'ua_index': ua_index, 'ua': ua}
                  try:
                      session = requests.Session()
                      session.headers.update({
                          'User-Agent': ua,
                          'Accept-Language': 'en-US,en;q=0.9',
                          'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8',
                      })
                      with image_path.open('rb') as f:
                          upload = session.post(
                              'https://lens.google.com/upload',
                              params={'hl': 'en', 'gl': 'us'},
                              files={
                                  'encoded_image': (image_path.name, f, 'image/jpeg' if image_path.suffix.lower() in {'.jpg', '.jpeg'} else 'image/png'),
                                  'image_content': (None, ''),
                              },
                              allow_redirects=False,
                              timeout=120,
                          )
                      attempt['upload_status'] = upload.status_code
                      attempt['location'] = upload.headers.get('Location')
                      attempt['upload_headers'] = dict(upload.headers)

                      if attempt['location']:
                          result = session.get(attempt['location'], allow_redirects=True, timeout=120)
                          attempt['result_status'] = result.status_code
                          attempt['result_url'] = result.url
                          attempt['result_title'] = BeautifulSoup(result.text, 'html.parser').title.get_text(' ', strip=True) if BeautifulSoup(result.text, 'html.parser').title else ''
                          stem = f"{image_path.stem}-ua{ua_index}"
                          (out / f'{stem}.html').write_text(result.text, encoding='utf-8', errors='replace')
                          parsed = old_parser(result.text)
                          attempt['af_script_count'] = parsed['script_count']
                          (out / f'{stem}-af.json').write_text(json.dumps(parsed, indent=2, ensure_ascii=False), encoding='utf-8')
                          urls = generic_extract(result.text)
                          attempt['url_count'] = len(urls)
                          (out / f'{stem}-urls.json').write_text(json.dumps(urls, indent=2, ensure_ascii=False), encoding='utf-8')

                          # Also inspect every script's visible strings for candidate page titles/domains.
                          soup = BeautifulSoup(result.text, 'html.parser')
                          script_text = '\n'.join(s.get_text() for s in soup.find_all('script'))
                          strings = re.findall(r'"([^"\\]{4,240})"', script_text)
                          filtered = []
                          for value in strings:
                              value = decode_js_string(value)
                              if any(token in value.lower() for token in ['http', 'pinterest', 'manga', 'junji', 'black clover', 'tomoe', 'instagram', 'tumblr', 'reddit', 'deviantart', 'pixiv']):
                                  filtered.append(value)
                          (out / f'{stem}-candidate-strings.json').write_text(json.dumps(filtered[:5000], indent=2, ensure_ascii=False), encoding='utf-8')
                  except Exception as exc:
                      attempt['error'] = repr(exc)
                      attempt['traceback'] = traceback.format_exc()
                  report['attempts'].append(attempt)

          (out / 'report.json').write_text(json.dumps(report, indent=2, ensure_ascii=False), encoding='utf-8')
          print(json.dumps(report, indent=2, ensure_ascii=False))
          PY

      - name: Commit Lens parser results to temporary branch
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add reverse-image-temp/results-google-lens-parser || true
          git commit -m "Store parsed Google Lens result data" || exit 0
          git push origin HEAD:temp-reverse-image-search
